
services:
  db:
    image: postgres:15-alpine
    container_name: sre-postgres-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-sre_agent_db}
      POSTGRES_USER: ${DB_USER:-sre_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sre_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./sre-agent-core
      dockerfile: Dockerfile
    container_name: sre-backend-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-sre_user}:${DB_PASSWORD:-sre_password}@34.28.159.214:5432/${DB_NAME:-sre_agent_db}
      BASE_URL: https://pipeline-agent.tech
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8000
      HOST: 0.0.0.0
      WORKSPACE_DIR: /tmp/sre-agent-workspace

  frontend:
    build:
      context: ./sre-agent-frontend
      dockerfile: Dockerfile
    container_name: sre-frontend-dashboard
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  postgres_data:
